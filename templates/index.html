<!DOCTYPE html>
<html>
<head>
    <title>Face Anti-Spoofing System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Face Anti-Spoofing System</h1>
    <div class="main-container">
        <div class="camera-panel">
            <h2>Live Camera</h2>
            <img src="{{ url_for('video') }}" class="video-feed">
        </div>
        <div class="info-panel">
            <div class="card suggestion-card">
                <h3>Suggestion</h3>
                <p id="suggestion">Align your face</p>
            </div>
            <div class="card status-card">
                <h3>Status</h3>
                <p id="status">Detecting...</p>
            </div>
            <div class="card confidence-card">
                <h3>Accuracy</h3>
                <p id="confidence">--</p>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
